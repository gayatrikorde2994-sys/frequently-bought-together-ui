<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; color: #0f1111; }

        /* THE MAIN HORIZONTAL ROW */
        .bundle-wrapper {
            display: flex;
            flex-direction: row;
            align-items: flex-start; /* Aligns the tops of the columns */
            gap: 15px;
        }

        /* EACH COLUMN (Image + Text) */
        .product-column {
            display: flex;
            flex-direction: column; /* Stacks image and text vertically */
            width: 150px;           /* Fixed width keeps them aligned */
            flex-shrink: 0;
        }

        /* IMAGE BOX */
        .img-card {
            background-color: #f7f7f7;
            border-radius: 8px;
            height: 190px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 12px; /* Gap between image and text */
        }

        .img-card img { max-width: 80%; max-height: 80%; object-fit: contain; }

        .checkbox { position: absolute; top: 10px; right: 10px; }

        /* TEXT BELOW IMAGE */
        .product-info { font-size: 14px; line-height: 1.4; }
        .product-info strong { display: block; margin-bottom: 4px; }
        .price { font-size: 16px; font-weight: bold; }
        .price sup { font-size: 10px; }

        /* THE PLUS SIGN - Middle alignment */
        .plus-separator {
            padding-top: 85px; /* Pushes the plus sign to the middle of the image height */
            font-size: 24px;
            color: #565959;
            font-weight: 300;
        }

        /* CHECKOUT BOX ON THE RIGHT */
        .checkout-box {
            margin-left: 30px;
            padding-top: 40px;
            min-width: 260px;
        }

        .total-price { font-size: 18px; margin-bottom: 10px; }
        .amazon-btn {
            background: #FFD814;
            border: 1px solid #FCD200;
            border-radius: 20px;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h2>Frequently bought together</h2>

    <div class="bundle-wrapper">
        
        <div class="product-column">
            <div class="img-card">
                <img src="https://images-eu.ssl-images-amazon.com/images/I/61ooI9tA5BL._AC_UL116_SR116,116_.jpg">
                <input type="checkbox" class="checkbox" checked>
            </div>
            <div class="product-info">
                <strong>This item:</strong> Gathod (Marathi)
                <div class="price">₹240<sup>00</sup></div>
            </div>
        </div>

        <span class="plus-separator">+</span>

        <div class="product-column">
            <div class="img-card">
                <img src="https://images-eu.ssl-images-amazon.com/images/I/81V+aBakkPL._AC_UL116_SR116,116_.jpg">
                <input type="checkbox" class="checkbox" checked>
            </div>
            <div class="product-info">
                <a href="#" style="color: #007185; text-decoration: none;">Nasti Uthathev - नस्ती...</a>
                <div class="price">₹212<sup>00</sup></div>
            </div>
        </div>

        <span class="plus-separator">+</span>

        <div class="product-column">
            <div class="img-card">
                <img src="https://images-eu.ssl-images-amazon.com/images/I/411jh3+apuL._AC_UL116_SR116,116_.jpg">
                <input type="checkbox" class="checkbox" checked>
            </div>
            <div class="product-info">
                <a href="#" style="color: #007185; text-decoration: none;">Batatyachi Chal...</a>
                <div class="price">₹220<sup>00</sup></div>
            </div>
        </div>

        <div class="checkout-box">
            <div class="total-price">Total price: <strong>₹672.00</strong></div>
            <button class="amazon-btn">Add all 3 to Cart</button>
        </div>

    </div>

</body>
</html>
